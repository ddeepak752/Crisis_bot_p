version: "3.1"

nlu:
# =====================================================
# CRISIS RESPONSE CHATBOT - COMPREHENSIVE NLU TESTS
# For Assignment: Advanced Conversational UI Design
# Testing: Intent Classification + Entity Extraction
# =====================================================

# -------------------------
# BASIC INTENTS TESTING
# -------------------------
- intent: greet
  examples: |
    - hello there
    - good morning assistant
    - hey can you help
    - hi bot
    - hello crisis assistant
    - good evening
    - are you online
    - hey there bot
    - greetings
    - hi emergency assistant

- intent: goodbye
  examples: |
    - see you later
    - thanks goodbye
    - bye for now
    - i'm done here
    - end conversation
    - that's all thanks
    - goodbye assistant
    - thanks and bye
    - talk to you later
    - farewell

- intent: emergency
  examples: |
    - this is urgent
    - i have emergency situation
    - help me urgent
    - emergency situation here
    - crisis happening now
    - urgent help needed
    - emergency assistance
    - i need crisis help
    - urgent emergency
    - emergency protocol

- intent: restart
  examples: |
    - start over please
    - reset this chat
    - new conversation
    - restart session
    - begin again
    - clear everything
    - fresh start
    - restart bot
    - reset conversation
    - start from beginning

# -------------------------
# CRISIS TYPE CLASSIFICATION TESTS
# -------------------------
- intent: report_earthquake
  examples: |
    - ground shaking right now
    - earthquake happening
    - building vibrating
    - tremor right now
    - seismic activity
    - aftershock happening
    - everything shaking
    - earthquake emergency
    - strong tremors
    - quake in progress

- intent: report_flood
  examples: |
    - water rising fast
    - flash flooding here
    - street underwater
    - basement flooded
    - flood emergency
    - rising water levels
    - overflowing river
    - water everywhere
    - flood situation
    - drainage overflow

- intent: report_fire
  examples: |
    - building burning
    - smoke and flames
    - fire emergency
    - kitchen burning
    - wildfire approaching
    - smoke everywhere
    - flames visible
    - fire in building
    - burning smell
    - smoke inhalation risk

- intent: report_power_outage
  examples: |
    - electricity out
    - blackout situation
    - no power anywhere
    - power failure
    - outage emergency
    - lights went out
    - electrical outage
    - power down
    - blackout emergency
    - no electricity

